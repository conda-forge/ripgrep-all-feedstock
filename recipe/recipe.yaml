context:
  version: "0.10.9"

package:
  name: ripgrep-all
  version: ${{ version }}

source:
  url: https://github.com/phiresky/ripgrep-all/archive/v${{ version }}.tar.gz
  sha256: a5b3150940dcddd35a26e9de398f11a563d0466a335e5450ceb7ff369e9fef45

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
  run:
    - fzf
    - ripgrep

tests:
  - script:
      - rga --help

about:
  license: AGPL-3.0-or-later
  license_file:
    - LICENSE.md
    - THIRDPARTY.yml
  summary: Wrapper around ripgrep that adds multiple rich file types
  homepage: https://github.com/phiresky/ripgrep-all
  repository: https://github.com/phiresky/ripgrep-all

extra:
  recipe-maintainers:
    - danielnachun
